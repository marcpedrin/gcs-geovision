<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Campus Security System</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="page-container">
        <div class="page-header">
            <h1>Campus Security &amp; Facial Recognition System</h1>
            <p>Login</p>
        </div>

        <form>
            <h2>User Login</h2>

            <label for="username">Username / Student ID:</label>
            <input type="text" id="username" name="username">

            <label for="password">Password:</label>
            <input type="password" id="password" name="password">

            <a href="user/signup-details.html" class="btn">Login (User)</a>
            <a href="admin/dashboard.html" class="btn">Login (Admin)</a>
        </form>

        <div class="section">
            <h3>New User?</h3>
            <p>If you do not have an account, sign up below.</p>
            <a href="user/signup-details.html" class="btn">Sign Up</a>
        </div>

        <div class="page-footer">
            <p>Campus Security System &copy; 2026</p>
        </div>
    </div>

</body>
</html>
