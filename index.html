<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>GeoVision — Campus Security</title>
<meta name="description" content="GeoVision Campus Security Command Centre — Secure Login">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ── RESET ── */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:'Inter',sans-serif}

/* ── BODY / BG ── */
body{
  background:#0a0a0a;
  color:#f0f0f0;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  padding:20px;
  overflow:hidden;
  position:relative;
}

/* Ambient glow orbs */
body::before{
  content:'';
  position:fixed;
  top:-200px; left:-200px;
  width:600px; height:600px;
  background:radial-gradient(circle, rgba(220,38,38,.18) 0%, transparent 65%);
  pointer-events:none;
  animation:orbFloat 8s ease-in-out infinite alternate;
}
body::after{
  content:'';
  position:fixed;
  bottom:-150px; right:-150px;
  width:500px; height:500px;
  background:radial-gradient(circle, rgba(220,38,38,.12) 0%, transparent 65%);
  pointer-events:none;
  animation:orbFloat 10s ease-in-out infinite alternate-reverse;
}
@keyframes orbFloat{
  from{transform:translate(0,0) scale(1)}
  to{transform:translate(30px,20px) scale(1.08)}
}

/* Grid bg texture */
.bg-grid{
  position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);
  background-size:48px 48px;
  pointer-events:none;
}

/* ── CARD ── */
.auth-card{
  position:relative;
  width:100%;
  max-width:420px;
  background:rgba(20,20,20,.88);
  border:1px solid rgba(255,255,255,.09);
  border-radius:24px;
  padding:24px 20px;
  box-shadow:0 24px 80px rgba(0,0,0,.6), inset 0 1px 0 rgba(255,255,255,.07);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  animation:cardIn .5s cubic-bezier(.22,.61,.36,1) both;
}
@keyframes cardIn{
  from{opacity:0;transform:translateY(24px) scale(.97)}
  to{opacity:1;transform:translateY(0) scale(1)}
}

/* ── LOGO ── */
.auth-logo{
  display:flex;
  align-items:center;
  justify-content:center;
  margin-bottom:20px;
}
.auth-logo img{
  height:120px;
  max-width:100%;
  width:auto;
  object-fit:contain;
}
/* ── TABS ── */
.auth-tabs{
  display:flex;
  background:rgba(255,255,255,.05);
  border-radius:12px;
  padding:4px;
  margin-bottom:28px;
  gap:4px;
}
.auth-tab{
  flex:1;
  padding:9px;
  border:none;
  border-radius:9px;
  font-size:13px;
  font-weight:700;
  font-family:'Inter',sans-serif;
  cursor:pointer;
  transition:all .2s;
  background:transparent;
  color:rgba(255,255,255,.45);
}
.auth-tab.active{
  background:#dc2626;
  color:#fff;
  box-shadow:0 4px 14px rgba(220,38,38,.35);
}

/* ── FORM PANELS ── */
.auth-panel{ display:none; animation:fadeIn .3s ease; }
.auth-panel.active{ display:block; }
@keyframes fadeIn{ from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

/* ── FORM ELEMENTS ── */
.auth-section-label{
  font-size:11px;
  font-weight:700;
  color:rgba(255,255,255,.35);
  text-transform:uppercase;
  letter-spacing:.7px;
  margin-bottom:16px;
}

.form-group{
  display:flex;
  flex-direction:column;
  gap:6px;
  margin-bottom:14px;
}
.form-label{
  font-size:11px;
  font-weight:700;
  color:rgba(255,255,255,.5);
  text-transform:uppercase;
  letter-spacing:.5px;
}
.form-input{
  padding:13px 14px;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.1);
  border-radius:10px;
  color:#fff;
  font-size:14px;
  font-family:'Inter',sans-serif;
  transition:all .2s;
  -webkit-appearance:none;
  width:100%;
}
.form-input:focus{
  border-color:#dc2626;
  box-shadow:0 0 0 3px rgba(220,38,38,.18);
  outline:none;
  background:rgba(255,255,255,.08);
}
.form-input::placeholder{color:rgba(255,255,255,.22)}
.form-input.error{ border-color:#dc2626; background:rgba(220,38,38,.07); }

.input-wrap{ position:relative; }
.input-eye{
  position:absolute;
  right:14px; top:50%;
  transform:translateY(-50%);
  background:none; border:none;
  color:rgba(255,255,255,.35);
  cursor:pointer; font-size:16px;
  padding:2px;
  line-height:1;
  transition:color .2s;
}
.input-eye:hover{ color:#dc2626; }

/* ── ERROR MSG ── */
.auth-error{
  font-size:12px;
  color:#f87171;
  background:rgba(220,38,38,.12);
  border:1px solid rgba(220,38,38,.25);
  border-radius:8px;
  padding:10px 14px;
  margin-bottom:14px;
  display:none;
  animation:fadeIn .2s ease;
}
.auth-error.show{ display:block; }

/* ── SUBMIT BUTTON ── */
.auth-btn{
  width:100%;
  padding:14px;
  background:#dc2626;
  border:none;
  border-radius:12px;
  color:#fff;
  font-size:15px;
  font-weight:800;
  font-family:'Inter',sans-serif;
  cursor:pointer;
  transition:all .22s;
  margin-top:6px;
  position:relative;
  overflow:hidden;
}
.auth-btn::after{
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(135deg, rgba(255,255,255,.08) 0%, transparent 50%);
  pointer-events:none;
}
.auth-btn:hover{
  background:#b91c1c;
  transform:translateY(-2px);
  box-shadow:0 8px 24px rgba(220,38,38,.4);
}
.auth-btn:active{ transform:translateY(0); }
.auth-btn:disabled{
  opacity:.5;
  pointer-events:none;
}
.auth-btn-loading::before{
  content:'';
  display:inline-block;
  width:14px; height:14px;
  border:2px solid rgba(255,255,255,.4);
  border-top-color:#fff;
  border-radius:50%;
  animation:spin .7s linear infinite;
  margin-right:8px;
  vertical-align:middle;
}
@keyframes spin{ to{transform:rotate(360deg)} }

/* ── DIVIDER ── */
.auth-divider{
  display:flex;
  align-items:center;
  gap:12px;
  margin:18px 0;
}
.auth-divider::before,.auth-divider::after{
  content:'';
  flex:1;
  height:1px;
  background:rgba(255,255,255,.08);
}
.auth-divider span{ font-size:11px; color:rgba(255,255,255,.3); font-weight:600; }

/* ── HINT CHIPS ── */
.auth-hints{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-bottom:18px;
}
.auth-hint-chip{
  display:inline-flex;
  align-items:center;
  gap:5px;
  padding:6px 11px;
  border-radius:8px;
  font-size:11px;
  font-weight:600;
  cursor:pointer;
  transition:all .18s;
  border:none;
  font-family:'Inter',sans-serif;
}
.auth-hint-admin{
  background:rgba(220,38,38,.12);
  color:#f87171;
  border:1px solid rgba(220,38,38,.2);
}
.auth-hint-student{
  background:rgba(99,102,241,.12);
  color:#a5b4fc;
  border:1px solid rgba(99,102,241,.2);
}
.auth-hint-chip:hover{ transform:translateY(-1px); filter:brightness(1.15); }

/* ── FOOTER NOTE ── */
.auth-footer{
  font-size:11px;
  color:rgba(255,255,255,.25);
  text-align:center;
  margin-top:20px;
  line-height:1.6;
}

/* ── TWO COLUMN GRID ── */
.form-grid-2{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}
@media(max-width:380px){
  .auth-card{ padding:32px 22px; }
  .form-grid-2{ grid-template-columns:1fr; }
}
</style>
</head>
<body>
<div class="bg-grid"></div>

<div class="auth-card">
  <!-- Logo -->
  <div class="auth-logo">
    <img src="assets/logo.png" alt="GeoVision"
      onerror="this.style.display='none'">
  </div>

  <!-- Tabs -->
  <div class="auth-tabs">
    <button class="auth-tab active" onclick="switchTab('login')">Sign In</button>
    <button class="auth-tab"        onclick="switchTab('register')">Register</button>
  </div>

  <!-- ── LOGIN PANEL ── -->
  <div class="auth-panel active" id="panel-login">
    <div class="auth-section-label">Quick Access Demo</div>
    <div class="auth-hints">
      <button class="auth-hint-chip auth-hint-admin" onclick="fillAdmin()">
        🔐 Admin Login
      </button>
      <button class="auth-hint-chip auth-hint-student" onclick="fillStudent()">
        🎓 Student Login
      </button>
    </div>

    <div class="auth-error" id="login-error"></div>

    <div class="form-group">
      <label class="form-label">Email Address</label>
      <input class="form-input" type="email" id="login-email"
        placeholder="your@reva.edu.in" autocomplete="email">
    </div>

    <div class="form-group">
      <label class="form-label">Password</label>
      <div class="input-wrap">
        <input class="form-input" type="password" id="login-password"
          placeholder="Enter password" autocomplete="current-password">
        <button class="input-eye" type="button" onclick="togglePwd('login-password', this)">👁</button>
      </div>
    </div>

    <button class="auth-btn" id="btn-login" onclick="doLogin()">Sign In</button>

    <div class="auth-footer">
      Secure access • GeoVision Campus Security v3.0
    </div>
  </div>

  <!-- ── REGISTER PANEL ── -->
  <div class="auth-panel" id="panel-register">
    <div class="auth-error" id="reg-error"></div>

    <div class="form-grid-2">
      <div class="form-group">
        <label class="form-label">First Name *</label>
        <input class="form-input" type="text" id="reg-fname" placeholder="John">
      </div>
      <div class="form-group">
        <label class="form-label">Last Name *</label>
        <input class="form-input" type="text" id="reg-lname" placeholder="Doe">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Email Address *</label>
      <input class="form-input" type="email" id="reg-email" placeholder="you@reva.edu.in">
    </div>

    <div class="form-group">
      <label class="form-label">Student / Employee ID *</label>
      <input class="form-input" type="text" id="reg-id" placeholder="e.g. SRN22CS001">
    </div>

    <div class="form-group">
      <label class="form-label">Phone Number</label>
      <input class="form-input" type="tel" id="reg-phone" placeholder="+91 98765 43210">
    </div>

    <div class="form-group">
      <label class="form-label">Department</label>
      <select class="form-input" id="reg-dept">
        <option value="">Select department…</option>
        <option>Computer Science & Engineering</option>
        <option>Electronics & Communication</option>
        <option>Mechanical Engineering</option>
        <option>Civil Engineering</option>
        <option>Business Administration</option>
        <option>Other</option>
      </select>
    </div>

    <div class="form-grid-2">
      <div class="form-group">
        <label class="form-label">Password *</label>
        <div class="input-wrap">
          <input class="form-input" type="password" id="reg-password" placeholder="Min 6 chars">
          <button class="input-eye" type="button" onclick="togglePwd('reg-password',this)">👁</button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Confirm *</label>
        <div class="input-wrap">
          <input class="form-input" type="password" id="reg-confirm" placeholder="Repeat">
        </div>
      </div>
    </div>

    <button class="auth-btn" id="btn-register" onclick="doRegister()">
      Create Account &amp; Enrol Face →
    </button>

    <div class="auth-footer">
      Already have an account?
      <a href="#" onclick="switchTab('login')" style="color:#f87171;text-decoration:none">Sign in here</a>
    </div>
  </div>
</div>

<script src="api/db.js"></script>
<script>
/* ── TAB SWITCH ───────────────────────────────── */
function switchTab(tab) {
  document.querySelectorAll('.auth-tab').forEach((t,i) =>
    t.classList.toggle('active', (tab==='login'&&i===0)||(tab==='register'&&i===1)));
  document.getElementById('panel-login').classList.toggle('active', tab === 'login');
  document.getElementById('panel-register').classList.toggle('active', tab === 'register');
}

/* ── HELPERS ──────────────────────────────────── */
function togglePwd(id, btn) {
  const inp = document.getElementById(id);
  if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '🙈'; }
  else                         { inp.type = 'password'; btn.textContent = '👁'; }
}

function showError(panelId, msg) {
  const el = document.getElementById(panelId);
  el.textContent = '⚠ ' + msg;
  el.classList.add('show');
}
function clearError(id) { document.getElementById(id).classList.remove('show'); }

function setLoading(btnId, loading) {
  const btn = document.getElementById(btnId);
  btn.disabled = loading;
  btn.classList.toggle('auth-btn-loading', loading);
}

/* ── QUICK-FILL CHIPS ─────────────────────────── */
function fillAdmin() {
  document.getElementById('login-email').value    = 'admin@reva.edu.in';
  document.getElementById('login-password').value = 'Admin';
}
function fillStudent() {
  document.getElementById('login-email').value    = 'student@reva.edu.in';
  document.getElementById('login-password').value = 'Student';
}

/* ── LOGIN ────────────────────────────────────── */
async function doLogin() {
  clearError('login-error');
  const email    = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;

  if (!email || !password) { showError('login-error', 'Please enter your email and password.'); return; }

  setLoading('btn-login', true);
  try {
    const result = await GeoVisionDB.authenticate(email, password);
    if (!result.ok) { showError('login-error', result.error); return; }
    // Route by role
    if (result.user.role === 'admin') {
      window.location.href = 'admin/dashboard.html';
    } else {
      window.location.href = 'user/profile.html';
    }
  } catch (e) {
    showError('login-error', 'Login failed. Please try again.');
    console.error(e);
  } finally {
    setLoading('btn-login', false);
  }
}

/* ── REGISTER ─────────────────────────────────── */
async function doRegister() {
  clearError('reg-error');
  const fname    = document.getElementById('reg-fname').value.trim();
  const lname    = document.getElementById('reg-lname').value.trim();
  const email    = document.getElementById('reg-email').value.trim();
  const sid      = document.getElementById('reg-id').value.trim();
  const phone    = document.getElementById('reg-phone').value.trim();
  const dept     = document.getElementById('reg-dept').value;
  const password = document.getElementById('reg-password').value;
  const confirm  = document.getElementById('reg-confirm').value;

  if (!fname || !lname) { showError('reg-error','Please enter your full name.'); return; }
  if (!email || !email.includes('@')) { showError('reg-error','Please enter a valid email.'); return; }
  if (!sid)  { showError('reg-error','Please enter your student/employee ID.'); return; }
  if (password.length < 6) { showError('reg-error','Password must be at least 6 characters.'); return; }
  if (password !== confirm) { showError('reg-error','Passwords do not match.'); return; }

  setLoading('btn-register', true);
  try {
    const result = await GeoVisionDB.users.register({
      email,
      password,
      name:      `${fname} ${lname}`,
      studentId: sid,
      phone,
      dept,
      year: '',
    });
    if (!result.ok) { showError('reg-error', result.error); return; }
    // Go to face enrolment first
    window.location.href = 'user/face_capture_system.html?mode=register';
  } catch (e) {
    showError('reg-error','Registration failed. Please try again.');
    console.error(e);
  } finally {
    setLoading('btn-register', false);
  }
}

/* ── KEYBOARD ENTER ───────────────────────────── */
document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  if (document.getElementById('panel-login').classList.contains('active')) doLogin();
  else doRegister();
});

/* ── AUTH GUARD (don't show login if already signed in) ── */
window.addEventListener('load', () => {
  const u = GeoVisionDB.currentUser();
  if (u) {
    window.location.href = u.role === 'admin' ? 'admin/dashboard.html' : 'user/profile.html';
  }
});
</script>
</body>
</html>
