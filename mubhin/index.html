<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no">

<title>Pro Identity Verification</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

/* YOUR ORIGINAL STYLE — NOT MODIFIED */

:root{
--bg-main:#0B0F19;
--bg-card:rgba(20,27,45,0.7);
--border-card:rgba(255,255,255,0.08);
--accent-glow:rgba(14,165,233,0.5);
--accent-color:#0ea5e9;
--success-color:#10b981;
--error-color:#ef4444;
--text-main:#f8fafc;
--text-muted:#94a3b8;
--glass-blur:blur(20px);
}

body{
margin:0;
font-family:'Outfit',sans-serif;
background-color:var(--bg-main);
display:flex;
align-items:center;
justify-content:center;
min-height:100vh;
color:var(--text-main);
}

/* CARD */

.card{
background:var(--bg-card);
backdrop-filter:var(--glass-blur);
width:90%;
max-width:420px;
border-radius:24px;
border:1px solid var(--border-card);
padding:32px 24px;
display:flex;
flex-direction:column;
align-items:center;
text-align:center;
position:relative;
}

.hidden{display:none!important}

/* VIDEO */

.video-container{
position:relative;
width:220px;
height:220px;
margin-bottom:24px;
}

.video-inner{
width:100%;
height:100%;
border-radius:50%;
overflow:hidden;
background:black;
}

video,img{
width:100%;
height:100%;
object-fit:cover;
transform:scaleX(-1);
}

/* BUTTONS */

button{
padding:14px;
border:none;
border-radius:12px;
font-size:.95rem;
cursor:pointer;
width:100%;
margin-top:10px;
}

.btn-primary{
background:var(--accent-color);
color:white;
}

.btn-secondary{
background:#222;
color:white;
}

.preview-image{
width:120px;
height:120px;
border-radius:16px;
margin:6px;
object-fit:cover;
}

</style>

</head>

<body>


<!-- PAGE 1 CAPTURE UI -->

<div id="capturePage" class="card">

<h2>Identity Verification</h2>

<p id="instruction">
Initializing camera...
</p>

<div class="video-container">

<div class="video-inner">

<video id="video"
autoplay
muted
playsinline></video>

<img id="finalPhoto"
class="hidden">

</div>

</div>

<p id="status">
Starting camera...
</p>

<button
id="continueBtn"
class="btn-primary hidden">
Continue
</button>

</div>



<!-- PAGE 2 RESULT UI -->

<div id="resultPage"
class="card hidden">

<h2>Verification Complete</h2>

<p>
Captured face dataset stored successfully
</p>

<div id="imageGallery"></div>

<button
class="btn-secondary"
onclick="restartProcess()">
Scan Again
</button>

</div>



<script>

/*
ANDROID CAMERA SAFE START
*/

const video=document.getElementById("video");

const finalPhoto=document.getElementById("finalPhoto");

const statusText=document.getElementById("status");

const instruction=document.getElementById("instruction");

const continueBtn=document.getElementById("continueBtn");

const capturePage=document.getElementById("capturePage");

const resultPage=document.getElementById("resultPage");

const imageGallery=document.getElementById("imageGallery");


let stream;

let captures=[];


const steps=[

"Face camera directly",

"Turn slightly left",

"Turn slightly right",

"Tilt up",

"Tilt down"

];


let stepIndex=0;


/*
START CAMERA
*/

navigator.mediaDevices.getUserMedia({

video:{
facingMode:{ideal:"user"},
width:{ideal:640},
height:{ideal:640}
},

audio:false

})

.then(s=>{

stream=s;

video.srcObject=s;

video.play();

instruction.textContent="Position face in frame";

statusText.textContent="Camera ready";

setTimeout(nextStep,1500);

})

.catch(()=>{

instruction.textContent=
"Allow camera permission";

statusText.textContent=
"Camera blocked";

});


function nextStep(){

if(stepIndex>=steps.length){

finishCapture();

return;

}

instruction.textContent=

steps[stepIndex];

setTimeout(captureFrame,1600);

}


function captureFrame(){

const canvas=document.createElement("canvas");

canvas.width=video.videoWidth||640;

canvas.height=video.videoHeight||640;

const ctx=canvas.getContext("2d");

ctx.drawImage(video,0,0);

const imgData=

canvas.toDataURL("image/jpeg",0.9);

captures.push(imgData);


/*
STORE DATA LOCALLY
*/

localStorage.setItem(

"face_capture_"+stepIndex,

imgData

);


stepIndex++;

nextStep();

}


function finishCapture(){

statusText.textContent=

"Identity Confirmed";

finalPhoto.src=captures[0];

finalPhoto.classList.remove("hidden");

video.classList.add("hidden");


if(stream){

stream.getTracks().forEach(t=>t.stop());

}


localStorage.setItem(

"final_face_capture",

captures[0]

);


continueBtn.classList.remove("hidden");

}


continueBtn.onclick=()=>{

showResultPage();

};



/*
RESULT PAGE DISPLAY
*/

function showResultPage(){

capturePage.classList.add("hidden");

resultPage.classList.remove("hidden");

imageGallery.innerHTML="";


for(let i=0;i<5;i++){

let img=

localStorage.getItem(

"face_capture_"+i

);

if(img){

let element=

document.createElement("img");

element.src=img;

element.className="preview-image";

imageGallery.appendChild(

element

);

}

}

}



/*
RESTART SYSTEM
*/

function restartProcess(){

localStorage.clear();

location.reload();

}

</script>

</body>

</html>
