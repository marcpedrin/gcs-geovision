<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entry History – Campus Management Portal</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            background: #f0fdf4;
        }

        .container {
            padding: 20px;
        }

        h1 {
            margin-bottom: 10px;
        }

        .table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 10px;
            overflow: hidden;
        }

        .table th, .table td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
            text-align: left;
        }

        .table th {
            background: #16a34a;
            color: white;
        }

        .status {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
        }

        .verified { background: #dcfce7; color: #16a34a; }
        .pending { background: #fef3c7; color: #f59e0b; }
        .threat { background: #fee2e2; color: #ef4444; }

    </style>
</head>

<body>

<div class="container">
    <h1>Entry History</h1>

    <table class="table">
        <thead>
            <tr>
                <th>Name</th>
                <th>Role</th>
                <th>Entry Time</th>
                <th>Exit Time</th>
                <th>Status</th>
            </tr>
        </thead>

        <tbody id="table-body"></tbody>
    </table>
</div>

<script>
    const data = [
        { name: "Aarav Sharma", role: "Student", entry: "08:00 AM", exit: "02:00 PM", status: "verified" },
        { name: "Priya Patel", role: "Student", entry: "09:00 AM", exit: "—", status: "pending" },
        { name: "Rohan Desai", role: "Student", entry: "08:30 AM", exit: "01:00 PM", status: "threat" }
    ];

    const table = document.getElementById("table-body");

    data.forEach(d => {
        table.innerHTML += `
            <tr>
                <td>${d.name}</td>
                <td>${d.role}</td>
                <td>${d.entry}</td>
                <td>${d.exit}</td>
                <td><span class="status ${d.status}">${d.status}</span></td>
            </tr>
        `;
    });
</script>

</body>
</html>
