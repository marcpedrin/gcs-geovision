<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Enter Details</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <div class="page-container">
        <div class="page-header">
            <h1>Enter Student / Staff Details</h1>
        </div>

        <nav>
            <a href="../index.html">Back to Login</a>
        </nav>

        <form>
            <h2>Personal Information</h2>

            <label for="full-name">Full Name:</label>
            <input type="text" id="full-name" name="full-name">

            <label for="student-id">Student / Staff ID:</label>
            <input type="text" id="student-id" name="student-id">

            <label for="email">Email Address:</label>
            <input type="email" id="email" name="email">

            <label for="department">Department:</label>
            <input type="text" id="department" name="department">

            <label for="phone">Phone Number:</label>
            <input type="text" id="phone" name="phone">

            <a href="capture-face.html" class="btn">Next: Capture Facial Data</a>
            <a href="../index.html" class="btn">Cancel</a>
        </form>

        <div class="page-footer">
            <p>Campus Security System &copy; 2026</p>
        </div>
    </div>

</body>
</html>
